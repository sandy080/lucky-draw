<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎡 幸運大輪盤模式</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #ebf3f9; color: #2c3e50; padding: 30px 20px; max-width: 850px; margin: 0 auto; text-align: center; }
        .back-btn { position: absolute; top: 20px; left: 20px; padding: 8px 15px; background: #475569; border: none; color: white; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 14px; }
        h1 { color: #1a3a5f; margin-bottom: 25px; font-size: 32px; }
        .wheel-container { display: flex; flex-direction: column; align-items: center; position: relative; margin-top: 10px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .anim-prize-indicator { font-size: 22px; color: #2980b9; margin-bottom: 15px; font-weight: bold; }
        .wheel-wrapper { position: relative; width: 360px; height: 360px; margin-bottom: 20px; }
        #wheelCanvas { border-radius: 50%; box-shadow: 0 0 15px rgba(0,0,0,0.15); }
        .wheel-pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #e74c3c; z-index: 10; }
        .btn { padding: 14px 40px; background-color: #2c3e50; color: white; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        
        .results-section { margin-top: 35px; background: #fff; padding: 25px; border-radius: 10px; text-align: left; border: 1px solid #ccd1d9; }
        .results-section h2 { margin-top: 0; color: #1a3a5f; border-bottom: 1px solid #ccd1d9; padding-bottom: 10px; }
        .prize-card { background: #f8fafc; border-left: 5px solid #1abc9c; padding: 12px 20px; margin-bottom: 12px; border-radius: 0 6px 6px 0; color: #333; }
        .prize-card-title { font-weight: bold; color: #2980b9; margin-bottom: 5px; }
        .export-box { margin-top: 30px; background: #f1f5f9; padding: 20px; border-radius: 8px; }
        textarea { width: 100%; height: 120px; background: #fff; color: #333; border: 1px solid #ccd1d9; padding: 10px; box-sizing: border-box; border-radius: 6px; font-family: monospace; }
        .btn-secondary { background-color: #2ecc71; margin-top: 15px; font-size: 16px; padding: 12px; display: block; width: 100%; border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn" id="btnBack">⬅ 返回控制中心</a>
    <h1 id="viewTitle">🎡 幸運大輪盤</h1>

    <div class="wheel-container">
        <div id="wheelPrizeIndicator" class="anim-prize-indicator">請選擇下方獎項後點擊旋轉輪盤</div>
        <select id="wheelPrizeSelect" style="padding: 10px; margin-bottom: 20px; border-radius: 6px; width: 260px; font-size: 16px;"></select>
        
        <div class="wheel-wrapper">
            <div class="wheel-pointer"></div>
            <canvas id="wheelCanvas" width="360" height="360"></canvas>
        </div>
        <button class="btn" id="btnSpinWheel" onclick="spinWheel()">🎡 旋轉輪盤 (單抽)</button>
    </div>

    <div class="results-section">
        <h2 id="dynamicResultsTitle">🏆 抽獎結果</h2>
        <div id="webResultsList"></div>

        <div class="export-box">
            <div style="font-weight: bold; color: #1a3a5f; margin-bottom: 10px;">📋 清單</div>
            <textarea id="txtLinearOutput" readonly></textarea>
            <button class="btn-secondary" onclick="downloadTxtFile()">💾 下載抽獎結果明細 (.txt)</button>
        </div>
    </div>

    <script>
        let eventTitle = "", candidates = [], prizes = [];
        let wheelCandidates = [], finalWinnersData = [];
        let startAngle = 0, spinTimeout = null, spinAngleStart = 10, spinTime = 0, spinTimeTotal = 0;
        let ctx, globalTxtOutput = "", isRolling = false;
        
        // 頂級高彩度盛宴配色（已將原來的黑色/深藍 "#01012b" 換成鮮艷熱烈的爆米花紅 "#ff4757"）
        const vibrantColors = [
            "#ff2a6d", // 耀眼霓紅
            "#05d9e8", // 璀璨電藍
            "#ff4757", // 爆米花烈紅 (取代原有的黑色)
            "#f5a623", // 盛宴金黃
            "#10ac84", // 翡翠極綠
            "#ff6b6b", // 珊瑚暖紅
            "#5f27cd", // 魔幻深紫
            "#ff9f43", // 傲氣烈橘
            "#0abde3", // 晴空蔚藍
            "#ee5253"  // 經典正紅
        ];

        // 初始化 Web Audio 環境
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 輪盤指針卡榫 Tick 聲 (改為獨立時間差音頻，避免高頻繪圖卡死聲音)
        function playWheelTick() {
            try {
                initAudio();
                let osc = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                osc.type = 'triangle'; 
                osc.frequency.setValueAtTime(320, audioCtx.currentTime); // 清脆扎實的答答聲
                gainNode.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.015);
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.02);
            } catch(e) {}
        }

        // 成功中獎喜慶和弦音效
        function playWinSound() {
            try {
                initAudio();
                let now = audioCtx.currentTime;
                let freqs = [523.25, 659.25, 783.99, 1046.50]; 
                freqs.forEach((f, index) => {
                    let osc = audioCtx.createOscillator();
                    let gainNode = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(f, now + (index * 0.04));
                    gainNode.gain.setValueAtTime(0.08, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.7);
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    osc.start(now);
                    osc.stop(now + 0.7);
                });
            } catch(e) {}
        }

        window.onload = function() {
            eventTitle = sessionStorage.getItem('draw_title') || "抽獎活動";
            document.getElementById('viewTitle').innerText = "🎡 " + eventTitle;
            document.getElementById('dynamicResultsTitle').innerText = `🏆 ${eventTitle}結果`;
            
            document.body.onclick = function() { initAudio(); };

            try {
                candidates = JSON.parse(sessionStorage.getItem('draw_candidates')) || [];
                prizes = JSON.parse(sessionStorage.getItem('draw_prizes')) || [];
            } catch(e) {
                alert("讀取設定失敗！"); window.location.href = 'index.html'; return;
            }
            ctx = document.getElementById("wheelCanvas").getContext("2d");
            initPrizeSelect();
        };

        function initPrizeSelect() {
            let select = document.getElementById('wheelPrizeSelect');
            select.innerHTML = '';
            prizes.forEach(p => {
                let opt = document.createElement('option');
                opt.value = p.name; opt.innerText = p.name;
                select.appendChild(opt);
            });
            initWheelPool();
        }

        function initWheelPool() {
            wheelCandidates = candidates.filter(c => !finalWinnersData.some(f => f.winner === c));
            if(wheelCandidates.length > 24) { wheelCandidates = wheelCandidates.slice(0, 24); }
            drawWheel();
        }

        let lastSegmentIndex = -1;

        function drawWheel() {
            if (!ctx || wheelCandidates.length === 0) return;
            let len = wheelCandidates.length;
            let arc = Math.PI / (len / 2);
            ctx.clearRect(0,0,360,360);
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 2.5;

            for (let i = 0; i < len; i++) {
                let angle = startAngle + i * arc;
                ctx.fillStyle = vibrantColors[i % vibrantColors.length];
                
                ctx.beginPath();
                ctx.arc(180, 180, 170, angle, angle + arc, false);
                ctx.lineTo(180, 180);
                ctx.fill();
                ctx.stroke();

                ctx.save();
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 14px Arial";
                ctx.translate(180 + Math.cos(angle + arc / 2) * 120, 180 + Math.sin(angle + arc / 2) * 120);
                ctx.rotate(angle + arc / 2 + Math.PI / 2);
                let text = wheelCandidates[i];
                ctx.fillText(text, -ctx.measureText(text).width / 2, 0);
                ctx.restore();
            }

            // 修正音效判定逻辑，確保只要壓過一個格子的角度就絕對會發聲
            let degrees = startAngle * 180 / Math.PI + 90;
            let arcd = arc * 180 / Math.PI;
            let currentSegment = Math.floor((360 - degrees % 360) / arcd);
            if (currentSegment < 0) currentSegment = len + currentSegment;

            if (currentSegment !== lastSegmentIndex && isRolling) {
                playWheelTick(); 
                lastSegmentIndex = currentSegment;
            }
        }

        function spinWheel() {
            if(isRolling) return;
            if(wheelCandidates.length === 0) { alert("沒有名單了！"); return; }
            let prizeSelected = document.getElementById('wheelPrizeSelect').value;
            if(!prizeSelected) { alert("請先選擇獎項！"); return; }
            initAudio();

            isRolling = true;
            document.getElementById('btnSpinWheel').disabled = true;
            document.getElementById('btnBack').style.display = 'none';

            spinAngleStart = Math.random() * 10 + 12; 
            spinTime = 0;
            spinTimeTotal = Math.random() * 2000 + 4500; // 旋轉 4.5~6.5 秒
            rotateWheel();
        }

        function rotateWheel() {
            spinTime += 30;
            if (spinTime >= spinTimeTotal) { stopRotateWheel(); return; }
            let spinAngle = spinAngleStart - easeOut(spinTime, 0, spinAngleStart, spinTimeTotal);
            startAngle += (spinAngle * Math.PI / 180);
            drawWheel();
            spinTimeout = setTimeout(rotateWheel, 30);
        }

        function stopRotateWheel() {
            clearTimeout(spinTimeout);
            isRolling = false;
            document.getElementById('btnSpinWheel').disabled = false;
            document.getElementById('btnBack').style.display = 'block';
            
            let len = wheelCandidates.length;
            let arc = Math.PI / (len / 2);
            let degrees = startAngle * 180 / Math.PI + 90;
            let arcd = arc * 180 / Math.PI;
            let index = Math.floor((360 - degrees % 360) / arcd);
            if(index < 0) index = len + index;
            
            let luckyOne = wheelCandidates[index];
            let prizeSelected = document.getElementById('wheelPrizeSelect').value;

            document.getElementById('wheelPrizeIndicator').innerText = `🎉 恭喜 【${luckyOne}】 抽中 【${prizeSelected}】！`;
            
            playWinSound(); // 最終中獎澎湃音樂

            finalWinnersData.push({ winner: luckyOne, prize: prizeSelected });
            updateOutputs();
            initWheelPool();
        }

        function easeOut(t, b, c, d) {
            let ts = (t /= d) * t; let tc = ts * t;
            return b + c * (tc * ts + -5 * ts * ts + 10 * tc + -10 * ts + 5 * t);
        }

        function updateOutputs() {
            let grouped = {};
            finalWinnersData.forEach(item => {
                if(!grouped[item.prize]) grouped[item.prize] = [];
                grouped[item.prize].push(item.winner);
            });
            let html = "";
            for(let p in grouped) {
                html += `<div class="prize-card"><div class="prize-card-title">🎁 ${p}</div><div>🎉 已中獎名單：${grouped[p].join(', ')}</div></div>`;
            }
            document.getElementById('webResultsList').innerHTML = html;

            let rows = [`【活動主題】：${eventTitle}`, `中獎號碼\t中獎獎項`];
            finalWinnersData.forEach(item => { rows.push(`${item.winner}\t${item.prize}`); });
            globalTxtOutput = rows.join('\r\n');
            document.getElementById('txtLinearOutput').value = rows.join('\n');
        }

        function downloadTxtFile() {
            if (!globalTxtOutput) return;
            let blob = new Blob([globalTxtOutput], { type: "text/plain;charset=utf-8;" });
            let link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `${eventTitle}_輪盤結果.txt`);
            link.click();
        }
    </script>
</body>
</html>
